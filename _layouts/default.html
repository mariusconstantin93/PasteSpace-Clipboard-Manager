<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% seo %}
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #24292e;
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }
    h1, h2, h3 { font-weight: 600; margin-top: 1.8rem; margin-bottom: 0.6rem; }
    h1 { font-size: 2rem; }
    h2 { font-size: 1.4rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3rem; }
    h3 { font-size: 1.1rem; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: #f6f8fa; padding: 0.15em 0.4em; border-radius: 4px; font-size: 90%; }
    pre { background: #f6f8fa; padding: 1rem; border-radius: 6px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #dfe2e5; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f6f8fa; font-weight: 600; }
    tr:nth-child(even) { background: #fafbfc; }
    blockquote { border-left: 4px solid #dfe2e5; margin: 0; padding-left: 1rem; color: #6a737d; }
    img { max-width: 100%; height: auto; }
    details { margin: 0.5rem 0; }
    summary { cursor: pointer; font-weight: 600; }
    hr { border: none; border-top: 1px solid #eaecef; margin: 2rem 0; }
    @media (prefers-color-scheme: dark) {
      body { background: #0d1117; color: #c9d1d9; }
      h2 { border-color: #21262d; }
      a { color: #58a6ff; }
      code, pre { background: #161b22; }
      th, td { border-color: #30363d; }
      th { background: #161b22; }
      tr:nth-child(even) { background: #0d1117; }
      blockquote { border-color: #30363d; color: #8b949e; }
      hr { border-color: #21262d; }
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
